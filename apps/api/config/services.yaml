# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.auth_users:
        - email: 'alex@example.com'
          display_name: 'Alex Rivera'
          password_hash: '$2y$12$5yFkWcIIj8xrkUxVUbP.EuuN8tSm9TLP/JpiV5JIo8irAwdS0iNBW'
          roles: ['ROLE_ADMIN', 'ROLE_USER']
    app.passkey_credentials:
        - email: 'alex@example.com'
          credential_id: 'demo-passkey-alex-2026'
          label: 'Alex MacBook Touch ID'
    app.passkey_policy_default_require_after_password_login: false
    app.passkey_allowed_origins:
        - 'http://localhost:5173'
        - 'http://localhost:8080'
        - 'http://127.0.0.1:5173'
        - 'http://127.0.0.1:8080'
    app.notifications_from_address: '%env(string:MAIL_FROM_ADDRESS)%'
    app.smtp_enabled: '%env(bool:SMTP_ENABLED)%'
    app.smtp_host: '%env(string:SMTP_HOST)%'
    app.smtp_port: '%env(int:SMTP_PORT)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Auth\InMemoryAuthUserStore:
        arguments:
            $users: '%app.auth_users%'
            $cachePool: '@cache.app'

    App\Auth\InMemoryPasskeyCredentialStore:
        arguments:
            $seedCredentials: '%app.passkey_credentials%'
            $cachePool: '@cache.app'

    App\Auth\InMemoryPasskeyChallengeStore:
        arguments:
            $cachePool: '@cache.app'

    App\Auth\InMemoryRefreshTokenRevocationStore:
        arguments:
            $cachePool: '@cache.app'

    App\Auth\InMemoryPasskeyPolicyStore:
        arguments:
            $cachePool: '@cache.app'
            $defaultRequireAfterPassword: '%app.passkey_policy_default_require_after_password_login%'

    App\Auth\JwtTokenService:
        arguments:
            $secret: '%env(string:JWT_SECRET)%'
            $accessTokenTtl: '%env(int:JWT_ACCESS_TOKEN_TTL)%'
            $refreshTokenTtl: '%env(int:JWT_REFRESH_TOKEN_TTL)%'

    App\Controller\AuthController:
        arguments:
            $passkeyAllowedOrigins: '%app.passkey_allowed_origins%'

    App\Reservation\ReservationNotificationService:
        arguments:
            $shareDir: '%kernel.share_dir%'
            $fromAddress: '%app.notifications_from_address%'
            $smtpEnabled: '%app.smtp_enabled%'
            $smtpHost: '%app.smtp_host%'
            $smtpPort: '%app.smtp_port%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
