services:
  db:
    image: postgres:15-alpine
    container_name: tiskerti-db
    environment:
      POSTGRES_DB: tiskerti
      POSTGRES_USER: tiskerti
      POSTGRES_PASSWORD: tiskerti
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tiskerti-api
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://tiskerti:tiskerti@db:5432/tiskerti?serverVersion=15&charset=utf8
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@tiskerti.local}
      SMTP_ENABLED: ${SMTP_ENABLED:-0}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -lc "
      set -e;
      composer install --no-interaction --prefer-dist;
      until PGPASSWORD=tiskerti psql -h db -U tiskerti -d tiskerti -c 'SELECT 1' >/dev/null 2>&1; do
        echo 'Waiting for PostgreSQL...';
        sleep 2;
      done;
      php bin/console doctrine:migrations:migrate --no-interaction;
      PGPASSWORD=tiskerti psql -h db -U tiskerti -d tiskerti -f scripts/seed_demo_data.sql;
      php -S 0.0.0.0:8000 -t public
      "

  web:
    image: node:20-alpine
    container_name: tiskerti-web
    working_dir: /app
    volumes:
      - ./apps/web:/app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://nginx}
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  nginx:
    image: nginx:alpine
    container_name: tiskerti-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: tiskerti-mailhog
    profiles:
      - mail
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
