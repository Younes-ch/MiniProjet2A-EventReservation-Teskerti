services:
  db:
    image: postgres:15-alpine
    container_name: tiskerti-db
    environment:
      POSTGRES_DB: tiskerti
      POSTGRES_USER: tiskerti
      POSTGRES_PASSWORD: tiskerti
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiskerti -d tiskerti"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tiskerti-api
    working_dir: /var/www/api
    volumes:
      - ./apps/api:/var/www/api
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://tiskerti:tiskerti@db:5432/tiskerti?serverVersion=15&charset=utf8
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@tiskerti.local}
      SMTP_ENABLED: ${SMTP_ENABLED:-1}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -lc "
      set -e;
      composer install --no-interaction --prefer-dist;
      until PGPASSWORD=tiskerti psql -h db -U tiskerti -d tiskerti -c 'SELECT 1' >/dev/null 2>&1; do
        echo 'Waiting for PostgreSQL...';
        sleep 2;
      done;
      php bin/console doctrine:migrations:migrate --no-interaction;
      PGPASSWORD=tiskerti psql -h db -U tiskerti -d tiskerti -f scripts/seed_demo_data.sql;
      php -S 0.0.0.0:8000 -t public
      "
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8000/api/health')===false?1:0);"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s

  web:
    image: node:20-alpine
    container_name: tiskerti-web
    working_dir: /app
    volumes:
      - ./apps/web:/app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://api:8000}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 90s

  nginx:
    image: nginx:alpine
    container_name: tiskerti-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: tiskerti-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
